<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KittenY's OS · 四核桌面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      transition: background-image 0.5s ease;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    body {
      background: linear-gradient(145deg, #fce4ec 0%, #f3e5f5 100%);
    }
    .wallpaper-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: inherit;
      background-size: cover;
      background-position: center;
      transition: background-image 0.5s ease;
    }
    .content-layer {
      position: relative;
      z-index: 1;
    }
    .safe-area-top {
      padding-top: max(env(safe-area-inset-top, 56px), 56px);
      padding-top: max(constant(safe-area-inset-top, 56px), 56px);
    }
    .glass {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
    }
    .glass-strong {
      background: rgba(255, 255, 255, 0.60);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .time-glass {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .dock-glass {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.05);
    }
    .app-icon {
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .app-icon:hover {
      transform: scale(1.08) translateY(-4px);
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 16px 40px rgba(233, 30, 99, 0.12);
    }
    .dock-icon {
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .dock-icon:hover {
      transform: scale(1.12) translateY(-6px);
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 20px; }
    ::-webkit-scrollbar-thumb { background: rgba(233, 30, 99, 0.25); border-radius: 20px; }

    @keyframes heart-rotate {
      0% { transform: translate(-50%, -50%) rotate(0deg) translateX(70px) rotate(0deg) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) rotate(180deg) translateX(85px) rotate(-180deg) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -50%) rotate(360deg) translateX(70px) rotate(-360deg) scale(1); opacity: 0.8; }
    }
    @keyframes heart-rotate-reverse {
      0% { transform: translate(-50%, -50%) rotate(360deg) translateX(65px) rotate(-360deg) scale(1.1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) rotate(180deg) translateX(50px) rotate(-180deg) scale(0.9); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) rotate(0deg) translateX(65px) rotate(0deg) scale(1.1); opacity: 0.6; }
    }
    .anim-heart-1 { animation: heart-rotate 2.5s infinite linear; }
    .anim-heart-2 { animation: heart-rotate-reverse 3s infinite linear; }

    .chat-item {
      transition: all 0.2s ease;
    }
    .chat-item:active {
      transform: scale(0.97);
      background: rgba(255,255,255,0.3);
    }
    .bubble-mine {
      background: #95ec69;
      color: #1a1a1a;
      border-bottom-right-radius: 4px;
    }
    .bubble-other {
      background: #ffffff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }
    .hidden-input { display: none; }
    
    /* 模态框样式 */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      max-width: 420px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal-box::-webkit-scrollbar { width: 4px; }
    .modal-box::-webkit-scrollbar-thumb { background: rgba(233,30,99,0.3); border-radius: 10px; }
    
    .avatar-upload {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(233,30,99,0.08);
      border: 2px dashed rgba(233,30,99,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 0 auto;
    }
    .avatar-upload:hover {
      border-color: rgba(233,30,99,0.6);
      background: rgba(233,30,99,0.12);
    }
    .avatar-upload.has-image {
      border: 2px solid rgba(233,30,99,0.3);
      background: transparent;
    }
    .avatar-upload img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,0,0,0.08);
      transition: all 0.3s;
      font-size: 14px;
      color: #1a1a1a;
    }
    .form-input:focus {
      outline: none;
      border-color: rgba(233,30,99,0.4);
      box-shadow: 0 0 0 3px rgba(233,30,99,0.08);
    }
    .form-input::placeholder { color: #aaa; }
    .form-textarea {
      min-height: 80px;
      resize: vertical;
      font-family: inherit;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    .form-group { margin-bottom: 16px; }
    
    .tag-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-option {
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(0,0,0,0.05);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    .tag-option:hover { background: rgba(0,0,0,0.08); }
    .tag-option.active {
      background: rgba(233,30,99,0.12);
      border-color: rgba(233,30,99,0.3);
      color: #d81b60;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

  <div id="wallpaper-overlay" class="wallpaper-overlay"></div>

  <!-- ========== 开屏动画 ========== -->
  <div id="splash-screen" class="fixed inset-0 z-[100] bg-[#faf6f0] flex flex-col justify-center items-center transition-all duration-700 ease-out">
    <div class="relative flex flex-col items-center justify-center p-12">
      <div class="absolute top-1/2 left-1/2 text-pink-300 text-lg anim-heart-1 pointer-events-none"><i class="fas fa-heart"></i></div>
      <div class="absolute top-1/2 left-1/2 text-pink-400 text-xs anim-heart-2 pointer-events-none"><i class="fas fa-heart"></i></div>
      <div class="absolute top-1/2 left-1/2 text-pink-200 text-sm anim-heart-1 pointer-events-none" style="animation-delay: -1.2s;"><i class="fas fa-heart"></i></div>
      <h1 class="text-2xl font-bold text-stone-700 tracking-wide font-serif mb-2">KittenY's Home</h1>
      <p class="text-sm text-stone-400 font-medium tracking-widest uppercase">welcome home</p>
      <div class="mt-6 text-pink-400/80 text-xs tracking-widest animate-bounce"><i class="fas fa-heart"></i></div>
    </div>
  </div>

  <!-- ========== 主内容 ========== -->
  <div class="content-layer flex flex-col items-center px-4 safe-area-top min-h-screen" style="padding-bottom: 100px;">

    <div class="time-glass w-full max-w-lg p-5 md:p-7 rounded-[3rem] text-center mb-4 shadow-xl border border-white/30 mt-2">
      <div id="clock" class="text-6xl md:text-8xl font-black text-pink-900 tracking-tighter drop-shadow-sm">00:00</div>
      <div class="text-pink-800 font-bold mt-0.5 text-sm md:text-lg tracking-wider">✦ KittenY's Desktop ✦</div>
    </div>

    <div id="home-screen" class="grid grid-cols-4 gap-5 md:gap-8 w-full max-w-2xl mx-auto mb-6">
      <div onclick="openApp('chat')" class="flex flex-col items-center cursor-pointer group">
        <div class="w-20 h-20 md:w-24 md:h-24 glass rounded-[2.2rem] flex items-center justify-center text-4xl md:text-5xl app-icon shadow-md border border-white/30">💬</div>
        <span class="text-stone-800 font-bold mt-2 text-sm md:text-base drop-shadow-sm">聊天</span>
      </div>
      <div onclick="openApp('settings')" class="flex flex-col items-center cursor-pointer group">
        <div class="w-20 h-20 md:w-24 md:h-24 glass rounded-[2.2rem] flex items-center justify-center text-4xl md:text-5xl app-icon shadow-md border border-white/30">⚙️</div>
        <span class="text-stone-800 font-bold mt-2 text-sm md:text-base drop-shadow-sm">设置</span>
      </div>
      <div onclick="openApp('cloud')" class="flex flex-col items-center cursor-pointer group relative">
        <div class="w-20 h-20 md:w-24 md:h-24 glass rounded-[2.2rem] flex items-center justify-center text-4xl md:text-5xl app-icon shadow-md border border-white/30">☁️</div>
        <span class="text-stone-800 font-bold mt-2 text-sm md:text-base drop-shadow-sm">云记忆</span>
        <span class="absolute top-0 right-0 w-3 h-3 bg-emerald-400 rounded-full shadow-lg ring-2 ring-white/60 animate-pulse"></span>
      </div>
      <div onclick="openApp('dev')" class="flex flex-col items-center cursor-pointer group relative">
        <div class="w-20 h-20 md:w-24 md:h-24 glass rounded-[2.2rem] flex items-center justify-center text-4xl md:text-5xl app-icon shadow-md border border-white/30">🛠️</div>
        <span class="text-stone-800 font-bold mt-2 text-sm md:text-base drop-shadow-sm">开发</span>
        <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-rose-500 rounded-full text-[10px] text-white font-bold flex items-center justify-center shadow-lg ring-2 ring-white/60">!</span>
      </div>
      <div onclick="openApp('appearance')" class="flex flex-col items-center cursor-pointer group">
        <div class="w-20 h-20 md:w-24 md:h-24 glass rounded-[2.2rem] flex items-center justify-center text-4xl md:text-5xl app-icon shadow-md border border-white/30">🎨</div>
        <span class="text-stone-800 font-bold mt-2 text-sm md:text-base drop-shadow-sm">外观</span>
      </div>
    </div>

    <div class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-lg dock-glass rounded-3xl py-3 px-5 flex justify-around items-center z-40">
      <button onclick="openApp('chat')" class="dock-icon flex flex-col items-center text-stone-600 hover:text-pink-600 transition-colors">
        <i class="fas fa-comment-dots text-xl"></i><span class="text-[10px] mt-0.5">聊天</span>
      </button>
      <button onclick="openApp('settings')" class="dock-icon flex flex-col items-center text-stone-600 hover:text-pink-600 transition-colors">
        <i class="fas fa-sliders-h text-xl"></i><span class="text-[10px] mt-0.5">设置</span>
      </button>
      <button onclick="openApp('cloud')" class="dock-icon flex flex-col items-center text-stone-600 hover:text-pink-600 transition-colors relative">
        <i class="fas fa-cloud text-xl"></i><span class="text-[10px] mt-0.5">云记忆</span>
        <span class="absolute -top-0.5 -right-1.5 w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
      </button>
      <button onclick="openApp('dev')" class="dock-icon flex flex-col items-center text-stone-600 hover:text-pink-600 transition-colors relative">
        <i class="fas fa-code text-xl"></i><span class="text-[10px] mt-0.5">开发</span>
        <span class="absolute -top-0.5 -right-1.5 w-2 h-2 bg-rose-500 rounded-full animate-pulse"></span>
      </button>
      <button onclick="openApp('appearance')" class="dock-icon flex flex-col items-center text-stone-600 hover:text-pink-600 transition-colors">
        <i class="fas fa-palette text-xl"></i><span class="text-[10px] mt-0.5">外观</span>
      </button>
    </div>
  </div>

  <!-- ========== 全屏应用视图 ========== -->
  <div id="app-view" class="fixed inset-0 glass-strong z-50 hidden p-4 md:p-6 overflow-y-auto safe-area-top" style="padding-bottom: 100px;">
    <button onclick="closeApp()" class="mb-4 font-bold text-xl text-stone-700 hover:text-pink-600 transition-colors flex items-center gap-2 bg-white/30 backdrop-blur-sm px-4 py-2 rounded-full w-fit">
      <span>←</span> 返回桌面
    </button>
    <div id="app-content" class="max-w-3xl mx-auto"></div>
  </div>

  <!-- ========== 添加角色模态框 ========== -->
  <div id="add-role-modal" class="modal-overlay hidden" onclick="if(event.target===this) closeModal()">
    <div class="modal-box">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold text-stone-800">添加新好友</h3>
        <button onclick="closeModal()" class="text-stone-400 hover:text-stone-600 text-xl">&times;</button>
      </div>
      
      <!-- 头像上传 -->
      <div class="form-group text-center">
        <div id="avatar-preview" class="avatar-upload" onclick="document.getElementById('avatar-input').click()">
          <span id="avatar-placeholder">📷</span>
        </div>
        <input type="file" id="avatar-input" accept="image/*" class="hidden-input" onchange="previewAvatar(event)">
        <p class="text-xs text-stone-400 mt-1">点击上传Ta的头像</p>
      </div>

      <!-- 名字 -->
      <div class="form-group">
        <label class="form-label">名字</label>
        <input id="role-name" class="form-input" placeholder="给Ta起个名字">
      </div>

      <!-- 分组 -->
      <div class="form-group">
        <label class="form-label">默认 (未分组)</label>
        <select id="role-group" class="form-input">
          <option value="默认">默认</option>
          <option value="好友">好友</option>
          <option value="家人">家人</option>
          <option value="工作">工作</option>
        </select>
      </div>

      <!-- TA的人设 -->
      <div class="form-group">
        <label class="form-label">TA的人设 (AI PERSONA)</label>
        <textarea id="role-persona" class="form-input form-textarea" placeholder="输入详细的角色性格、背景故事、说话语气..."></textarea>
      </div>

      <!-- 我的身份 -->
      <div class="form-group">
        <label class="form-label">我的身份 (USER PERSONA)</label>
        <select id="user-persona" class="form-input">
          <option value="">-- 默认 (不使用预设) --</option>
          <option value="主人">主人</option>
          <option value="朋友">朋友</option>
          <option value="恋人">恋人</option>
          <option value="学生">学生</option>
        </select>
      </div>

      <!-- 关联世界书 -->
      <div class="form-group">
        <label class="form-label">关联世界书 (CONTEXT)</label>
        <div class="bg-stone-50 rounded-2xl p-3 border border-stone-200/60">
          <div class="flex items-center justify-between text-sm">
            <span class="text-stone-600">默认分组</span>
            <div class="flex gap-3">
              <label class="flex items-center gap-1 text-stone-500"><input type="checkbox" checked> 全选本组</label>
              <button class="text-stone-400">取消</button>
            </div>
          </div>
        </div>
      </div>

      <button onclick="saveRole()" class="w-full bg-gradient-to-r from-pink-500 to-rose-400 hover:from-pink-600 hover:to-rose-500 text-white py-3 rounded-2xl font-bold shadow-lg transition-all mt-2">
        添加
      </button>
    </div>
  </div>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="wallpaper-input" accept="image/*" class="hidden-input" onchange="handleWallpaperUpload(event)">

  <script>
    (function() {
      "use strict";

      // ============================================================
      // ========== 数据管理 ==========
      // ============================================================
      
      // 从 localStorage 加载角色
      function loadRoles() {
        try {
          const data = localStorage.getItem('kitten_roles');
          if (data) return JSON.parse(data);
        } catch(e) {}
        return [];
      }

      // 保存角色到 localStorage
      function saveRolesToStorage(roles) {
        localStorage.setItem('kitten_roles', JSON.stringify(roles));
      }

      // 从 localStorage 加载消息
      function loadMessages() {
        try {
          const data = localStorage.getItem('kitten_messages');
          if (data) return JSON.parse(data);
        } catch(e) {}
        return {};
      }

      // 保存消息到 localStorage
      function saveMessagesToStorage(messages) {
        localStorage.setItem('kitten_messages', JSON.stringify(messages));
      }

      // 当前选中的角色ID
      let currentRoleId = null;
      // 当前头像数据
      let currentAvatarData = null;

      // ============================================================
      // ========== 开屏 ==========
      // ============================================================
      window.addEventListener('DOMContentLoaded', function() {
        const splash = document.getElementById('splash-screen');
        setTimeout(function() {
          splash.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
          setTimeout(function() { splash.style.display = 'none'; }, 700);
        }, 2000);
        
        const savedWallpaper = localStorage.getItem('kitten_wallpaper');
        if (savedWallpaper) {
          document.body.style.backgroundImage = `url(${savedWallpaper})`;
          document.getElementById('wallpaper-overlay').style.backgroundImage = `url(${savedWallpaper})`;
        }
      });

      // ============================================================
      // ========== 时间 ==========
      // ============================================================
      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('clock').innerText = `${h}:${m}`;
      }
      updateClock();
      setInterval(updateClock, 10000);

      // ============================================================
      // ========== 壁纸 ==========
      // ============================================================
      window.handleWallpaperUpload = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          const imageUrl = e.target.result;
          document.body.style.backgroundImage = `url(${imageUrl})`;
          document.getElementById('wallpaper-overlay').style.backgroundImage = `url(${imageUrl})`;
          localStorage.setItem('kitten_wallpaper', imageUrl);
          alert('✅ 壁纸更换成功！');
          closeApp();
        };
        reader.readAsDataURL(file);
      };

      window.resetWallpaper = function() {
        document.body.style.backgroundImage = '';
        document.getElementById('wallpaper-overlay').style.backgroundImage = '';
        localStorage.removeItem('kitten_wallpaper');
        alert('✅ 已恢复默认壁纸');
        closeApp();
      };

      // ============================================================
      // ========== 模态框 ==========
      // ============================================================
      window.openModal = function() {
        document.getElementById('add-role-modal').classList.remove('hidden');
        // 重置表单
        document.getElementById('role-name').value = '';
        document.getElementById('role-persona').value = '';
        document.getElementById('role-group').value = '默认';
        document.getElementById('user-persona').value = '';
        document.getElementById('avatar-placeholder').innerHTML = '📷';
        document.getElementById('avatar-preview').classList.remove('has-image');
        currentAvatarData = null;
      };

      window.closeModal = function() {
        document.getElementById('add-role-modal').classList.add('hidden');
      };

      window.previewAvatar = function(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          currentAvatarData = e.target.result;
          const placeholder = document.getElementById('avatar-placeholder');
          placeholder.innerHTML = `<img src="${currentAvatarData}" alt="avatar">`;
          document.getElementById('avatar-preview').classList.add('has-image');
        };
        reader.readAsDataURL(file);
      };

      // ============================================================
      // ========== 保存角色 ==========
      // ============================================================
      window.saveRole = function() {
        const name = document.getElementById('role-name').value.trim();
        const persona = document.getElementById('role-persona').value.trim();
        const group = document.getElementById('role-group').value;
        const userPersona = document.getElementById('user-persona').value;

        if (!name) { alert('请给角色起个名字'); return; }
        if (!persona) { alert('请填写角色的人设'); return; }

        const roles = loadRoles();
        const newRole = {
          id: 'r' + Date.now(),
          name: name,
          avatar: currentAvatarData || '😊',
          group: group,
          persona: persona,
          userPersona: userPersona,
          createdAt: new Date().toISOString()
        };
        roles.push(newRole);
        saveRolesToStorage(roles);
        
        closeModal();
        // 刷新聊天列表
        const content = document.getElementById('app-content');
        if (content.dataset.view === 'list' || !content.dataset.view) {
          renderChatList(content);
        }
        alert('✅ 角色添加成功！');
      };

      // ============================================================
      // ========== 删除角色 ==========
      // ============================================================
      window.deleteRole = function(roleId) {
        if (!confirm('确定要删除这个角色吗？所有聊天记录也会被删除。')) return;
        let roles = loadRoles();
        roles = roles.filter(r => r.id !== roleId);
        saveRolesToStorage(roles);
        // 删除对应消息
        const messages = loadMessages();
        delete messages[roleId];
        saveMessagesToStorage(messages);
        // 刷新列表
        const content = document.getElementById('app-content');
        renderChatList(content);
      };

      // ============================================================
      // ========== 聊天列表 ==========
      // ============================================================
      function renderChatList(container) {
        const roles = loadRoles();
        const messages = loadMessages();
        
        let listHtml = `
          <div class="flex items-center justify-between mb-5">
            <h2 class="text-3xl font-black text-stone-800">💬 聊天</h2>
            <button onclick="openModal()" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg transition-all flex items-center gap-2">
              <i class="fas fa-plus"></i> 添加角色
            </button>
          </div>
          <div class="glass rounded-3xl overflow-hidden border border-white/50">
        `;

        if (roles.length === 0) {
          listHtml += `
            <div class="empty-state">
              <div class="icon">👋</div>
              <p class="font-medium text-stone-600">还没有角色</p>
              <p class="text-sm text-stone-400 mt-1">点击右上角「添加角色」创建你的第一个AI好友</p>
            </div>
          `;
        } else {
          roles.forEach(role => {
            const roleMessages = messages[role.id] || [];
            const lastMsg = roleMessages.length > 0 ? roleMessages[roleMessages.length-1].text : '点击开始聊天';
            const lastTime = roleMessages.length > 0 ? roleMessages[roleMessages.length-1].time : '';
            const avatarDisplay = role.avatar && role.avatar.startsWith('data:') 
              ? `<img src="${role.avatar}" class="w-full h-full rounded-full object-cover">` 
              : `<span class="text-3xl">${role.avatar || '😊'}</span>`;
            
            listHtml += `
              <div onclick="openChatDetail('${role.id}')" class="chat-item flex items-center gap-3 p-4 border-b border-white/20 last:border-0 cursor-pointer hover:bg-white/20 active:bg-white/30">
                <div class="w-14 h-14 rounded-full bg-white/40 flex items-center justify-center shadow-sm border border-white/30 shrink-0 overflow-hidden">
                  ${avatarDisplay}
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex justify-between items-center">
                    <span class="font-bold text-stone-800">${role.name}</span>
                    <span class="text-xs text-stone-400">${lastTime}</span>
                  </div>
                  <p class="text-sm text-stone-500 truncate">${lastMsg}</p>
                </div>
                <button onclick="event.stopPropagation(); deleteRole('${role.id}')" class="text-stone-300 hover:text-rose-500 transition-colors text-sm p-1">
                  <i class="fas fa-trash-alt"></i>
                </button>
              </div>
            `;
          });
        }

        listHtml += `</div>`;
        container.innerHTML = listHtml;
        container.dataset.view = 'list';
      }

      // ============================================================
      // ========== 聊天详情 ==========
      // ============================================================
      window.openChatDetail = function(roleId) {
        const container = document.getElementById('app-content');
        const roles = loadRoles();
        const role = roles.find(r => r.id === roleId);
        if (!role) { renderChatList(container); return; }

        const messages = loadMessages();
        const roleMessages = messages[roleId] || [];
        
        const avatarDisplay = role.avatar && role.avatar.startsWith('data:') 
          ? `<img src="${role.avatar}" class="w-full h-full rounded-full object-cover">` 
          : `<span class="text-3xl">${role.avatar || '😊'}</span>`;

        let msgHtml = roleMessages.map(msg => {
          if (msg.from === 'me') {
            return `<div class="flex justify-end mb-3">
              <div class="bubble-mine px-4 py-2.5 rounded-2xl max-w-[75%] shadow-sm text-sm">${msg.text}</div>
            </div>`;
          } else {
            return `<div class="flex items-start gap-2 mb-3">
              <div class="w-9 h-9 rounded-full bg-white/40 flex items-center justify-center text-xl shrink-0 border border-white/30 overflow-hidden">${avatarDisplay}</div>
              <div class="bubble-other px-4 py-2.5 rounded-2xl max-w-[75%] shadow-sm text-sm">${msg.text}</div>
            </div>`;
          }
        }).join('');

        container.innerHTML = `
          <div class="flex items-center gap-3 pb-4 border-b border-white/30 mb-4">
            <button onclick="renderChatList(document.getElementById('app-content'))" class="text-xl hover:text-pink-600 transition-colors bg-white/30 rounded-full p-2 w-10 h-10 flex items-center justify-center">
              <i class="fas fa-chevron-left"></i>
            </button>
            <div class="w-11 h-11 rounded-full bg-white/40 flex items-center justify-center text-xl border border-white/30 overflow-hidden">${avatarDisplay}</div>
            <div>
              <div class="font-bold text-stone-800 text-lg">${role.name}</div>
              <div class="text-xs text-emerald-500">● 在线</div>
            </div>
          </div>
          <div id="chat-msg-area" class="h-[50vh] md:h-[55vh] overflow-y-auto mb-4 px-1">
            ${msgHtml || '<div class="text-center text-stone-400 text-sm mt-10">开始和 ' + role.name + ' 聊天吧</div>'}
          </div>
          <div class="flex gap-3 bg-white/40 rounded-3xl p-2 border border-white/50">
            <input id="chat-input" class="flex-1 p-3 bg-transparent focus:outline-none text-sm text-stone-700" placeholder="输入消息..." onkeydown="if(event.key==='Enter') sendChatMsg('${roleId}')">
            <button onclick="sendChatMsg('${roleId}')" class="bg-pink-500 hover:bg-pink-600 px-5 rounded-2xl text-white font-bold shadow-lg transition-all text-sm">发送</button>
          </div>
        `;
        
        const area = document.getElementById('chat-msg-area');
        if (area) setTimeout(() => area.scrollTop = area.scrollHeight, 50);
        container.dataset.view = 'detail';
        container.dataset.contactId = roleId;
        currentRoleId = roleId;
      };

      // ============================================================
      // ========== 发送消息 (调用真实API) ==========
      // ============================================================
      window.sendChatMsg = async function(roleId) {
        const input = document.getElementById('chat-input');
        if (!input || !input.value.trim()) return;
        const text = input.value.trim();
        input.value = '';

        // 获取角色信息
        const roles = loadRoles();
        const role = roles.find(r => r.id === roleId);
        if (!role) { alert('角色不存在'); return; }

        // 保存用户消息
        let messages = loadMessages();
        if (!messages[roleId]) messages[roleId] = [];
        messages[roleId].push({ from: 'me', text: text, time: '刚刚' });
        saveMessagesToStorage(messages);

        // 显示用户消息
        const area = document.getElementById('chat-msg-area');
        if (area) {
          const newMsg = `<div class="flex justify-end mb-3">
            <div class="bubble-mine px-4 py-2.5 rounded-2xl max-w-[75%] shadow-sm text-sm">${text}</div>
          </div>`;
          area.insertAdjacentHTML('beforeend', newMsg);
          area.scrollTop = area.scrollHeight;
        }

        // 获取API配置
        const apiUrl = localStorage.getItem('kitten_url') || '';
        const apiKey = localStorage.getItem('kitten_key') || '';
        const model = localStorage.getItem('kitten_model') || 'gpt-4o';

        if (!apiUrl || !apiKey) {
          // 没有配置API，模拟回复提示
          const reply = '⚠️ 请先在「设置」中配置 API 地址和 Key';
          messages[roleId].push({ from: 'other', text: reply, time: '刚刚' });
          saveMessagesToStorage(messages);
          if (area) {
            const avatarDisplay = role.avatar && role.avatar.startsWith('data:') 
              ? `<img src="${role.avatar}" class="w-full h-full rounded-full object-cover">` 
              : `<span class="text-3xl">${role.avatar || '😊'}</span>`;
            const replyMsg = `<div class="flex items-start gap-2 mb-3">
              <div class="w-9 h-9 rounded-full bg-white/40 flex items-center justify-center text-xl shrink-0 border border-white/30 overflow-hidden">${avatarDisplay}</div>
              <div class="bubble-other px-4 py-2.5 rounded-2xl max-w-[75%] shadow-sm text-sm">${reply}</div>
            </div>`;
            area.insertAdjacentHTML('beforeend', replyMsg);
            area.scrollTop = area.scrollHeight;
          }
          return;
        }

        // 构建系统提示词（角色扮演）
        let systemPrompt = role.persona || '你是一个友好的AI助手。';
        if (role.userPersona) {
          systemPrompt += `\n用户身份：${role.userPersona}`;
        }
        systemPrompt += `\n请根据你的角色设定来回复，保持角色一致性。`;

        // 构建对话历史（最近10条）
        const history = messages[roleId] || [];
        const recentHistory = history.slice(-10);
        const chatMessages = [
          { role: 'system', content: systemPrompt },
          ...recentHistory.map(m => ({
            role: m.from === 'me' ? 'user' : 'assistant',
            content: m.text
          }))
        ];

        try {
          const cleanUrl = apiUrl.trim().replace(/\/$/, '').replace(/\/v1$/, '');
          const res = await fetch(`${cleanUrl}/v1/chat/completions`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${apiKey}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              model: model,
              messages: chatMessages,
              max_tokens: 1000,
            }),
          });

          const data = await res.json();
          let reply = '';
          if (data.choices && data.choices[0]) {
            reply = data.choices[0].message.content;
          } else {
            reply = '❌ AI回复异常，请稍后再试';
          }

          // 保存AI回复
          messages[roleId].push({ from: 'other', text: reply, time: '刚刚' });
          saveMessagesToStorage(messages);

          // 显示AI回复
          if (area) {
            const avatarDisplay = role.avatar && role.avatar.startsWith('data:') 
              ? `<img src="${role.avatar}" class="w-full h-full rounded-full object-cover">` 
              : `<span class="text-3xl">${role.avatar || '😊'}</span>`;
            const replyMsg = `<div class="flex items-start gap-2 mb-3">
              <div class="w-9 h-9 rounded-full bg-white/40 flex items-center justify-center text-xl shrink-0 border border-white/30 overflow-hidden">${avatarDisplay}</div>
              <div class="bubble-other px-4 py-2.5 rounded-2xl max-w-[75%] shadow-sm text-sm">${reply}</div>
            </div>`;
            area.insertAdjacentHTML('beforeend', replyMsg);
            area.scrollTop = area.scrollHeight;
          }

        } catch (e) {
          const errorMsg = '❌ 请求失败: ' + e.message;
          messages[roleId].push({ from: 'other', text: errorMsg, time: '刚刚' });
          saveMessagesToStorage(messages);
          if (area) {
            const avatarDisplay = role.avatar && role.avatar.startsWith('data:') 
              ? `<img src="${role.avatar}" class="w-full h-full rounded-full object-cover">` 
              : `<span class="text-3xl">${role.avatar || '😊'}`;
            const replyMsg = `<div class="flex items-start gap-2 mb-3">
              <div class="w-9 h-9 rounded-full bg-white/40 flex items-center justify-center text-xl shrink-0 border border-white/30 overflow-hidden">${avatarDisplay}</div>
              <div class="bubble-other px-4 py-2.5 rounded-2xl max-w-[75%] shadow-sm text-sm">${errorMsg}</div>
            </div>`;
            area.insertAdjacentHTML('beforeend', replyMsg);
            area.scrollTop = area.scrollHeight;
          }
        }
      };

      // ============================================================
      // ========== 应用控制 ==========
      // ============================================================
      window.openApp = function(appId) {
        const view = document.getElementById('app-view');
        const content = document.getElementById('app-content');
        view.classList.remove('hidden');
        view.scrollTop = 0;

        if (appId === 'settings') {
          renderSettings(content);
        } else if (appId === 'chat') {
          renderChatList(content);
        } else if (appId === 'cloud') {
          renderCloud(content);
        } else if (appId === 'dev') {
          renderDev(content);
        } else if (appId === 'appearance') {
          renderAppearance(content);
        }
      };

      window.closeApp = function() {
        document.getElementById('app-view').classList.add('hidden');
        document.getElementById('app-content').innerHTML = '';
      };

      // ============================================================
      // ========== 设置 ==========
      // ============================================================
      function renderSettings(container) {
        const savedUrl = localStorage.getItem('kitten_url') || '';
        const savedKey = localStorage.getItem('kitten_key') || '';
        const savedModel = localStorage.getItem('kitten_model') || 'gpt-4o';
        container.innerHTML = `
          <h2 class="text-4xl font-black text-stone-800 mb-6">⚙️ 系统设置</h2>
          <div class="space-y-5">
            <div>
              <label class="block text-stone-600 font-bold text-sm mb-1">中转 API 地址</label>
              <input id="in-url" value="${savedUrl}" class="w-full p-4 rounded-2xl bg-white/70 border border-white/50 shadow-inner focus:outline-none focus:ring-2 focus:ring-pink-300" placeholder="例如 https://api.xxx.com">
            </div>
            <div>
              <label class="block text-stone-600 font-bold text-sm mb-1">API Key</label>
              <input id="in-key" value="${savedKey}" class="w-full p-4 rounded-2xl bg-white/70 border border-white/50 shadow-inner focus:outline-none focus:ring-2 focus:ring-pink-300" placeholder="sk-...">
            </div>
            <button onclick="testAndFetchModels()" class="bg-purple-500 hover:bg-purple-600 text-white w-full py-4 rounded-2xl font-bold shadow-lg transition-all duration-200 flex items-center justify-center gap-2">
              ⚡ 测试连接 & 拉取模型
            </button>
            <div>
              <label class="block text-stone-600 font-bold text-sm mb-1">当前模型</label>
              <select id="model-select" class="w-full p-4 rounded-2xl bg-white/70 border border-white/50 shadow-inner focus:outline-none focus:ring-2 focus:ring-pink-300">
                <option value="${savedModel}">${savedModel}</option>
              </select>
            </div>
            <div class="text-xs text-stone-400 mt-2">💾 配置自动保存在浏览器</div>
          </div>
        `;
        const urlInput = document.getElementById('in-url');
        const keyInput = document.getElementById('in-key');
        const modelSelect = document.getElementById('model-select');
        function saveSettings() {
          localStorage.setItem('kitten_url', urlInput.value.trim());
          localStorage.setItem('kitten_key', keyInput.value.trim());
          if (modelSelect.value) localStorage.setItem('kitten_model', modelSelect.value);
        }
        urlInput.addEventListener('change', saveSettings);
        keyInput.addEventListener('change', saveSettings);
        modelSelect.addEventListener('change', saveSettings);
        urlInput.addEventListener('blur', saveSettings);
        keyInput.addEventListener('blur', saveSettings);
      }

      // ============================================================
      // ========== 云记忆 ==========
      // ============================================================
      function renderCloud(container) {
        container.innerHTML = `
          <h2 class="text-4xl font-black text-stone-800 mb-4">☁️ 云记忆</h2>
          <div class="glass rounded-3xl p-6 border border-white/50 space-y-5">
            <div class="flex items-center gap-3">
              <span class="w-3 h-3 bg-stone-300 rounded-full"></span>
              <span class="font-bold text-stone-700">云服务器状态：<span class="text-stone-500">未连接</span></span>
            </div>
            <div class="bg-white/30 rounded-2xl p-4">
              <p class="text-stone-600 font-medium">🔗 服务器链接地址</p>
              <div class="mt-2 p-3 bg-white/50 rounded-xl font-mono text-sm text-stone-500 break-all">
                https://your-server.com/api/memory
              </div>
              <p class="text-xs text-stone-400 mt-2">💡 填入您的云记忆服务器地址，连接后即可自动同步记忆</p>
            </div>
            <div class="flex gap-3">
              <input id="cloud-url" placeholder="输入云记忆服务器地址..." class="flex-1 p-3 rounded-2xl bg-white/70 border border-white/50 shadow-inner focus:outline-none focus:ring-2 focus:ring-pink-300">
              <button onclick="saveCloudUrl()" class="bg-indigo-500 hover:bg-indigo-600 px-6 rounded-2xl text-white font-bold shadow-lg transition">连接</button>
            </div>
            <div class="text-sm text-stone-500 bg-white/20 p-3 rounded-xl">
              📡 记忆条目: <span class="font-mono">等待连接...</span>
            </div>
          </div>
        `;
      }

      window.saveCloudUrl = function() {
        const url = document.getElementById('cloud-url').value.trim();
        if (url) {
          localStorage.setItem('kitten_cloud_url', url);
          alert('✅ 云记忆地址已保存');
        } else {
          alert('⚠️ 请输入有效的服务器地址');
        }
      };

      // ============================================================
      // ========== 开发 ==========
      // ============================================================
      function renderDev(container) {
        container.innerHTML = `
          <h2 class="text-4xl font-black text-stone-800 mb-4">🛠️ 开发控制台</h2>
          <div class="glass rounded-3xl p-5 border border-white/50 space-y-4">
            <div class="flex items-center justify-between">
              <span class="font-bold text-stone-700">📡 系统状态</span>
              <span class="flex gap-3 text-sm">
                <span class="bg-emerald-100 px-3 py-1 rounded-full text-emerald-700">前端 ✔</span>
                <span class="bg-stone-100 px-3 py-1 rounded-full text-stone-500">后端 ⚪</span>
              </span>
            </div>
            <div class="bg-stone-900/10 rounded-2xl p-4 font-mono text-sm max-h-56 overflow-y-auto space-y-1.5">
              <div class="text-stone-500">[系统] 等待后端连接...</div>
            </div>
            <div class="flex gap-3">
              <button onclick="alert('🔄 刷新日志')" class="bg-rose-500 hover:bg-rose-600 px-6 py-2 rounded-2xl text-white font-bold shadow-lg transition">🔄 刷新</button>
              <button onclick="alert('📡 通信正常')" class="bg-stone-500 hover:bg-stone-600 px-6 py-2 rounded-2xl text-white font-bold shadow-lg transition">📡 测试连接</button>
            </div>
            <p class="text-xs text-stone-400">* 后端连接后此处会显示实时日志</p>
          </div>
        `;
      }

      // ============================================================
      // ========== 外观 ==========
      // ============================================================
      function renderAppearance(container) {
        container.innerHTML = `
          <h2 class="text-4xl font-black text-stone-800 mb-6">🎨 外观设置</h2>
          <div class="glass rounded-3xl p-6 border border-white/50 space-y-6">
            <div class="bg-white/30 rounded-2xl p-5 text-center">
              <i class="fas fa-image text-5xl text-stone-400 mb-3"></i>
              <p class="text-stone-600 font-medium">更换桌面壁纸</p>
              <p class="text-sm text-stone-400 mt-1">选择一张图片作为桌面背景</p>
            </div>
            <button onclick="document.getElementById('wallpaper-input').click()" class="w-full bg-gradient-to-r from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 text-white py-4 rounded-2xl font-bold shadow-lg transition-all flex items-center justify-center gap-3">
              <i class="fas fa-upload"></i> 选择图片
            </button>
            <button onclick="resetWallpaper()" class="w-full bg-stone-200 hover:bg-stone-300 text-stone-700 py-3 rounded-2xl font-bold transition-all flex items-center justify-center gap-3">
              <i class="fas fa-undo"></i> 恢复默认壁纸
            </button>
            <div class="text-xs text-stone-400 text-center bg-white/20 p-3 rounded-xl">
              💡 支持 JPG, PNG, WebP 等常见格式
            </div>
          </div>
        `;
      }

      // ============================================================
      // ========== 测试连接 ==========
      // ============================================================
      window.testAndFetchModels = async function() {
        const urlInput = document.getElementById('in-url');
        const keyInput = document.getElementById('in-key');
        const select = document.getElementById('model-select');
        if (!urlInput || !keyInput || !select) return;
        const rawUrl = urlInput.value.trim();
        const key = keyInput.value.trim();
        if (!rawUrl || !key) {
          alert('⚠️ 请填写完整的 API 地址和 Key');
          return;
        }
        const cleanUrl = rawUrl.replace(/\/$/, '').replace(/\/v1$/, '');
        const apiUrl = `${cleanUrl}/v1/models`;
        try {
          select.innerHTML = '<option>⏳ 加载中...</option>';
          const res = await fetch(apiUrl, {
            headers: { 'Authorization': `Bearer ${key}` },
          });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          if (data.data && Array.isArray(data.data)) {
            select.innerHTML = data.data.map(m => `<option value="${m.id}">${m.id}</option>`).join('');
            localStorage.setItem('kitten_url', cleanUrl);
            localStorage.setItem('kitten_key', key);
            if (data.data[0]) localStorage.setItem('kitten_model', data.data[0].id);
            alert('✅ 连接成功！模型列表已更新');
          } else {
            throw new Error('返回数据格式异常');
          }
        } catch (e) {
          alert('❌ 连接失败: ' + e.message);
          select.innerHTML = '<option>⚠️ 获取失败</option>';
        }
      };

    })();
  </script>
</body>
</html>
